# Detector model: sweepable silicon pixel sensor base model
# Ref: doc/usermanual/05_geometry_detectors/ - detector model parameters
# Ref: doc/usermanual/05_geometry_detectors/01_detector_models.md
#
# This file stays static. `sweep.py` overrides `pixel_size` and
# `sensor_thickness` on the detector instance via `-g`.
#
# Documented geometry sweep values used by `sweep.py`:
# - pixel_size: 10um 10um, 20um 20um, 30um 30um, 40um 40um, 50um 50um
# - sensor_thickness: 25um, 50um, 75um, 100um

type = "monolithic"
geometry = "pixel"
number_of_pixels = 16 16
pixel_size = 50um 50um
sensor_thickness = 50um
sensor_material = "silicon"
