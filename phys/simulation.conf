# ==============================================================================
# Allpix Squared simulation: 50um pixel, 50um thick Si sensor
# Electron hit rate and charge collection study
#
# This config uses DepositionPointCharge (no Geant4 required) to deposit
# MIP-like charge along straight tracks through the sensor. Each "event"
# represents one electron hitting the sensor.
#
# PHYSICS NOTE:
# DepositionPointCharge deposits charges uniformly along a straight line.
# This is a good approximation for relativistic electrons (>~1 MeV) which
# behave as minimum-ionizing particles (MIPs) in 50um of silicon.
# For lower energies (keV range, as in electron microscopy), scattering
# and Bragg-peak effects are NOT modeled -- Geant4 would be needed for
# accurate low-energy electron transport. The number_of_charges parameter
# is set externally by the sweep script to model different dE/dx values.
#
# The fluence sweep is handled by the run_sweep.sh script which varies
# both the number_of_events (hit rate) and number_of_charges (energy dep).
# ==============================================================================

# Ref: doc/usermanual/04_framework/04_modules.md -- global configuration
# Ref: doc/usermanual/03_getting_started/_index.md -- example setup
[Allpix]
log_level = "WARNING"
log_format = "SHORT"
detectors_file = "detector.conf"
number_of_events = 10000
# model_paths points to our custom model directory
# Ref: doc/usermanual/05_geometry_detectors/01_detector_models.md
model_paths = "./models"
random_seed = 0
output_directory = "output/"
# Ref: doc/usermanual/04_framework/04_modules.md -- root_file for histograms
root_file = "modules.root"

# ==============================================================================
# Electric field: linear model for fully-depleted thin sensor
# Ref: src/modules/ElectricFieldReader/README.md
# Ref: doc/usermanual/08_modules/ -- ElectricFieldReader
#
# Linear field: E(z) = (|Vbias|-|Vdepl|)/d + 2|Vdepl|/d * (1-z/d)
# For 50um Si, full depletion ~5-10V depending on resistivity.
# We use -20V bias to ensure full depletion and good charge collection.
# Negative bias = field pushes electrons toward readout (implant) side.
# ==============================================================================
[ElectricFieldReader]
model = "linear"
bias_voltage = -20V
depletion_voltage = -5V

# ==============================================================================
# Charge deposition: MIP-like track through full sensor thickness
# Ref: src/modules/DepositionPointCharge/README.md
#
# source_type = "mip": deposits charges along a line through the sensor
# model = "scan": systematically scans across one pixel cell to build
#   a uniform illumination (total scan positions = number_of_events)
# number_of_charges: electron-hole pairs per micrometer of track length
#   - MIP in Si: ~80 e-h pairs/um (most probable)
#   - This is overridden by the sweep script for different energies
#
# IMPORTANT: position is in LOCAL sensor coordinates.
# For "mip" source, position is 2D (x,y) -- z is the full sensor depth.
# ==============================================================================
[DepositionPointCharge]
source_type = "mip"
model = "scan"
scan_coordinates = x y
position = 0um 0um
# MIP-like: 80 e-h pairs per um is the most-probable value for Si
# Ref: PDG "Passage of particles through matter"
number_of_charges = 80/um
number_of_steps = 100

# ==============================================================================
# Charge propagation: drift + diffusion through the sensor
# Ref: src/modules/GenericPropagation/README.md
#
# Uses 4th-order Runge-Kutta integration with configurable mobility models.
# For a 50um sensor at -20V bias, drift time is ~1-2 ns, well within
# the default 25ns integration window.
# ==============================================================================
[GenericPropagation]
temperature = 293K
charge_per_step = 10
propagate_electrons = true
propagate_holes = false
# Ref: src/modules/GenericPropagation/README.md -- mobility models
mobility_model = "jacoboni"

# ==============================================================================
# Charge transfer: map propagated charges to nearest pixel
# Ref: src/modules/SimpleTransfer/README.md
# ==============================================================================
[SimpleTransfer]
max_depth_distance = 5um

# ==============================================================================
# Digitizer: minimal front-end model
# Ref: src/modules/DefaultDigitizer/README.md
#
# We set a LOW threshold to count essentially all hits (no readout
# electronics modeling per user request). Noise is set to zero.
# ==============================================================================
[DefaultDigitizer]
# Very low threshold to catch all signal -- we want raw charge info
threshold = 1e
threshold_smearing = 0e
electronics_noise = 0e

# ==============================================================================
# Histogrammer: produces hit maps, cluster size, charge distributions
# Ref: src/modules/DetectorHistogrammer/README.md
# ==============================================================================
[DetectorHistogrammer]
name = "dut"

# ==============================================================================
# ROOT output: save all objects for offline analysis
# Ref: src/modules/ROOTObjectWriter/README.md
#
# Exclude DepositedCharge and PropagatedCharge to avoid huge files
# (one entry per individual charge carrier).
# ==============================================================================
[ROOTObjectWriter]
file_name = "data"
exclude = DepositedCharge, PropagatedCharge
