# ==============================================================================
# Allpix Squared transient simulation for thin silicon pixels
#
# This file stays static. The actual sweep is defined in `sweep.py`, which uses
# Allpix command-line overrides for the values below.
#
# Documented sweep values used by `sweep.py`:
# - bias_voltage: -5V, -10V, -20V, -40V
# - integration_time: fixed here at 25ns for all runs
# - pixel_size: fixed in pixel.conf at 50um 50um for all runs
# - electron number_of_charges: 40/um, 30/um, 25/um, 27/um, 33/um, 35/um,
#   80/um, 65/um
# - photon number_of_charges: 275, 1374, 3297, 5495
# - detector overrides via `-g`: sensor_thickness = 25/50/75/100 um
# ==============================================================================

[Allpix]
log_level = "WARNING"
log_format = "SHORT"
detectors_file = "placement.conf"
number_of_events = 1000
model_paths = "."
random_seed = 0
output_directory = "outputs"
root_file = "modules.root"

[DopingProfileReader]
model = "constant"
doping_concentration = -2.13e+15/cm/cm/cm

[ElectricFieldReader]
model = "linear"
# Swept by sweep.py over [-5V, -10V, -20V, -40V]
bias_voltage = -20V
depletion_voltage = -5V

[WeightingPotentialReader]
model = "pad"

[DepositionPointCharge]
model = "fixed"
# sweep.py switches to "point" for photon cases
source_type = "mip"
# sweep.py overrides to 0um 0um 0um for photon cases
position = 0um 0um
mip_direction = 0 0 1
# sweep.py overrides per electron/photon study point
number_of_charges = 80/um
number_of_steps = 100

[TransientPropagation]
temperature = 293K
timestep = 0.01ns
# Fixed here for all runs
integration_time = 25ns
charge_per_step = 10
distance = 1
mobility_model = "jacoboni"
recombination_model = "none"
trapping_model = "none"
detrapping_model = "none"

[PulseTransfer]
timestep = 0.01ns
output_pulsegraphs = true

[DetectorHistogrammer]
name = "dut"

[ROOTObjectWriter]
file_name = "data"
exclude = DepositedCharge, PropagatedCharge
