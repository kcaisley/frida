# ==============================================================================
# Allpix Squared transient simulation for thin silicon pixels
#
# This file stays static. The actual sweep is defined in `sweep.py`, which uses
# Allpix command-line overrides for the values below.
#
# Documented sweep values used by `sweep.py`:
# - bias_voltage: -5V, -10V, -20V, -40V
# - integration_time: 10ns, 25ns, 100ns, 1000ns
# - electron number_of_charges: 40/um, 30/um, 25/um, 27/um, 33/um, 35/um,
#   80/um, 65/um
# - photon number_of_charges: 275, 1374, 3297, 5495
# - detector overrides via `-g`: pixel_size = 10/20/30/40/50 um,
#   sensor_thickness = 25/50/75/100 um
# ==============================================================================

[Allpix]
log_level = "WARNING"
log_format = "SHORT"
detectors_file = "placement.conf"
number_of_events = 1000
model_paths = "."
random_seed = 0
output_directory = "outputs"
root_file = "modules.root"

[DopingProfileReader]
model = "constant"
doping_concentration = -2.13e+15/cm/cm/cm

[ElectricFieldReader]
model = "linear"
bias_voltage = -20V # Swept by sweep.py over [-5V, -10V, -20V, -40V]
depletion_voltage = -5V

[WeightingPotentialReader]
model = "pad"

[DepositionPointCharge]
model = "fixed"
source_type = "mip" # sweep.py switches to "point" for photon cases
position = 0um 0um # sweep.py overrides to 0um 0um 0um for photon cases
mip_direction = 0 0 1
number_of_charges = 80/um # sweep.py overrides per electron/photon study point
number_of_steps = 100

[TransientPropagation]
temperature = 293K
timestep = 0.01ns
integration_time = 25ns # Swept by sweep.py over [10ns, 25ns, 100ns, 1000ns]
charge_per_step = 10
distance = 1
mobility_model = "jacoboni"
recombination_model = "none"
trapping_model = "none"
detrapping_model = "none"

[PulseTransfer]
timestep = 0.01ns
output_pulsegraphs = true

[DetectorHistogrammer]
name = "dut"

[ROOTObjectWriter]
file_name = "data"
exclude = DepositedCharge, PropagatedCharge
