# Detector geometry placement file
# Ref: doc/usermanual/05_geometry_detectors/02_passive_volumes.md
# Ref: doc/usermanual/04_framework/05_geometry.md
# Ref: examples/example_detector.conf

# Single detector at the origin, no rotation
# Section name "dut" becomes the detector's unique identifier
[dut]
type = "thin_pixel"
position = 0 0 0mm
orientation_mode = "xyz"
orientation = 0deg 0deg 0deg
