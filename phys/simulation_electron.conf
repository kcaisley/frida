# ==============================================================================
# Allpix Squared transient simulation: simplified electron deposition in silicon
#
# PURPOSE
# ------------------------------------------------------------------------------
# This configuration models the SENSOR-SIDE transient response only:
#   - simplified straight-line electron charge deposition
#   - drift + diffusion through a reverse-biased silicon sensor
#   - induced transient signal / pulse formation
#
# It intentionally does NOT model:
#   - Geant4 particle transport or realistic low-energy electron scattering
#   - TCAD electric-field maps
#   - digitizer / threshold / CSA / continuously resetting frontend
#   - APS reset / sample / buffer behavior
#   - dark current as a first-class source
#
# PHYSICS LIMITATION
# ------------------------------------------------------------------------------
# DepositionPointCharge with source_type = "mip" deposits charge uniformly along
# a straight line. This is a useful approximation for transport/waveform studies,
# but it is not a realistic model of low-energy electron passage in silicon.
# A future upgrade path is Geant4-based transport and deposition.
#
# ELECTRIC FIELD LIMITATION
# ------------------------------------------------------------------------------
# The first version uses a simple analytic linear electric field. This is easy
# to sweep, but is only an approximation. A future upgrade path is to use a
# more realistic analytic field or TCAD-derived field maps.
#
# TRANSIENT NOTE
# ------------------------------------------------------------------------------
# We use TransientPropagation to obtain induced transient pulses. This is the
# correct Allpix module family for waveform-oriented studies, but the fidelity
# of the waveform is limited by the simplified field and weighting-potential
# models selected here.
# ==============================================================================

[Allpix]
log_level = "WARNING"
log_format = "SHORT"
detectors_file = "detector.conf"
number_of_events = 1000
model_paths = "./models"
random_seed = 0
output_directory = "outputs/electron_default/"
root_file = "modules.root"

# ==============================================================================
# Doping profile
# ------------------------------------------------------------------------------
# Simple constant profile for first-pass studies. This mainly exists so that
# recombination models can be enabled later if desired.
#
# Future upgrade path:
#   - model = "regions"
#   - model = "mesh"
# ==============================================================================
[DopingProfileReader]
model = "constant"
doping_concentration = -2.13e+15/cm/cm/cm

# ==============================================================================
# Electric field
# ------------------------------------------------------------------------------
# Simple linear depletion-style field.
#
# Sweep candidates:
#   - bias_voltage
#   - detector thickness (through detector model specialization)
#
# Future upgrade path:
#   - model = "parabolic"
#   - model = "custom"
#   - model = "mesh" with TCAD-derived field map
# ==============================================================================
[ElectricFieldReader]
model = "linear"
bias_voltage = -20V
depletion_voltage = -5V

# ==============================================================================
# Weighting potential
# ------------------------------------------------------------------------------
# Use the built-in analytic pad model as a simple first-pass weighting
# potential. This allows induced transient signal calculation without requiring
# imported maps.
#
# Future upgrade path:
#   - imported weighting-potential map
# ==============================================================================
[WeightingPotentialReader]
model = "pad"

# ==============================================================================
# Simplified electron deposition
# ------------------------------------------------------------------------------
# source_type = "mip":
#   deposit charge along a straight line through the full sensor thickness
#
# model = "fixed":
#   fixed center-of-pixel vertical line deposition
#
# number_of_charges:
#   effective electron-hole pairs per micrometer
#   this is intended to be overridden by sweep scripts for different energies
#
# IMPORTANT:
#   this is a simplified transport surrogate, not a realistic electron passage
#   simulation for low-energy electrons.
# ==============================================================================
[DepositionPointCharge]
source_type = "mip"
model = "fixed"
position = 0um 0um
mip_direction = 0 0 1
number_of_charges = 80/um
number_of_steps = 100

# ==============================================================================
# Transient transport
# ------------------------------------------------------------------------------
# Produces induced transient signal information using the weighting potential.
#
# First version choices:
#   - no explicit radiation-damage trapping model by default
#   - no explicit recombination model by default
#   - both carrier types propagated for a more complete transient signal
#
# Sweep candidates:
#   - integration_time
#   - temperature
#   - recombination_model / lifetime parameters
#   - trapping_model / trapping parameters
# ==============================================================================
[TransientPropagation]
temperature = 293K
timestep = 0.01ns
integration_time = 25ns
charge_per_step = 10
distance = 1
mobility_model = "jacoboni"
recombination_model = "none"
trapping_model = "none"
detrapping_model = "none"

# ==============================================================================
# Pulse combination
# ------------------------------------------------------------------------------
# Combine induced pulses into per-pixel pulse objects/graphs.
# ==============================================================================
[PulseTransfer]
timestep = 0.01ns
output_pulsegraphs = true

# ==============================================================================
# Histogrammer
# ------------------------------------------------------------------------------
# Keep standard detector histograms enabled for quick inspection.
# ==============================================================================
[DetectorHistogrammer]
name = "dut"

# ==============================================================================
# ROOT output
# ------------------------------------------------------------------------------
# Keep PixelCharge output for downstream analysis. PropagatedCharge and
# DepositedCharge are excluded by default to keep files manageable.
# If detailed debugging is needed, these exclusions can be relaxed later.
# ==============================================================================
[ROOTObjectWriter]
file_name = "data"
exclude = DepositedCharge, PropagatedCharge
