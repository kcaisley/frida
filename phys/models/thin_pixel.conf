# Detector model: sweepable silicon pixel sensor base model
# Ref: doc/usermanual/05_geometry_detectors/ - detector model parameters
# Ref: doc/usermanual/05_geometry_detectors/01_detector_models.md
#
# This model is intentionally kept generic so that the detector instance in
# detector.conf or CLI overrides can specialize the following parameters:
#   - pixel_size
#   - sensor_thickness
#   - number_of_pixels
#
# Physics / modeling notes:
# - Sensor material is fixed to silicon for this study.
# - Pixel pitch and sensor thickness are intended sweep parameters.
# - This file only defines geometry/material; electric field, weighting
#   potential, deposition, transport, and pulse formation are configured in the
#   main simulation config.
# - A future upgrade path could add implants, support layers, or a more
#   technology-specific geometry if needed.

# Monolithic assembly (no bump bonds or separate readout chip modeled)
type = "monolithic"

# Rectangular pixel grid on Cartesian lattice
geometry = "pixel"

# Default matrix size kept modest for runtime; can be overridden later
number_of_pixels = 16 16

# Default pitch; intended to be overridden for sweeps:
# 10um, 20um, 30um, 40um, 50um
pixel_size = 50um 50um

# Default active sensor thickness; intended to be overridden for sweeps:
# 25um, 50um, 75um, 100um
sensor_thickness = 50um

# Silicon fixed for this study
sensor_material = "silicon"
