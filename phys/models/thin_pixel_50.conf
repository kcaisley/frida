# Detector model: 50um x 50um pixel, 50um thick silicon sensor
# Ref: doc/usermanual/05_geometry_detectors/ - detector model parameters
# Ref: models/rd53a_50.conf - similar 50um pitch (but 150um thick, hybrid)
# Ref: models/alpide.conf - monolithic example

# Monolithic assembly (no bump bonds or readout chip modeled)
# Ref: doc/usermanual/05_geometry_detectors/01_detector_models.md
type = "monolithic"

# Rectangular pixel grid on Cartesian lattice
geometry = "pixel"

# 16x16 pixel matrix for simulation (keeps runtime manageable).
# The actual focal plane is 500x500 pixels (25mm x 25mm),
# diced from a 300mm wafer -- but per-pixel physics is identical.
number_of_pixels = 16 16

# 50um x 50um pixel pitch
pixel_size = 50um 50um

# 50um active sensor thickness
sensor_thickness = 50um

# Silicon is the default sensor_material, but stated explicitly
# Ref: doc/usermanual/05_geometry_detectors/01_detector_models.md
# Valid options: SILICON, GALLIUM_ARSENIDE, GERMANIUM, CADMIUM_TELLURIDE, etc.
sensor_material = "silicon"
