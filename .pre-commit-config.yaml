repos:
  # Python linting + auto-fix (uses system ruff via uvx for speed)
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uvx ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format
        language: system
        types: [python]

  # Verilog lint (daq_core only — daq_top needs Xilinx primitives)
  - repo: local
    hooks:
      - id: verilator-lint
        name: verilator lint
        entry: >-
          verilator --lint-only -Wall
          -Wno-DECLFILENAME -Wno-MULTITOP -Wno-TIMESCALEMOD
          -Wno-PINCONNECTEMPTY -Wno-GENUNNAMED -Wno-WIDTHCONCAT
          -Wno-WIDTHTRUNC -Wno-WIDTHEXPAND -Wno-REDEFMACRO
          -Wno-UNUSEDSIGNAL -Wno-UNDRIVEN -Wno-UNUSEDPARAM
          -Ilibs/basil/basil/firmware/modules
          -Ilibs/basil/basil/firmware/modules/utils
          -Idesign/fpga
          libs/basil/basil/firmware/modules/utils/RAMB16_S1_S9_sim.v
        language: system
        files: '^design/fpga/daq_core\.v$'
