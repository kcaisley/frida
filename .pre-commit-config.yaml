repos:
  # Python linting + auto-fix (uses system ruff via uvx for speed)
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uvx ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format
        language: system
        types: [python]

  # Verilog lint — FPGA firmware
  - repo: local
    hooks:
      - id: verilator-lint-fpga
        name: verilator lint (Verilog-2005)
        entry: >-
          verilator --lint-only --language 1364-2005 -Wall --top-module daq_top
          verilator.vlt
          -Ilibs/basil/basil/firmware/modules
          -Ilibs/basil/basil/firmware/modules/utils
          -Ilibs/basil/basil/firmware/modules/includes
          -Idesign/hdl
          -Idesign/fpga
          -Idesign/fpga/SiTCP
        language: system
        pass_filenames: false
        files: '^design/fpga/.*\.v$'
        args: [design/fpga/daq_top.v]
        # Keep -Wall enabled for FRIDA sources. verilator.vlt leaves Basil in
        # the elaborated design but prevents its internal warnings from
        # blocking commits in this repository.

  # Verible format + lint for Verilog
  - repo: local
    hooks:
      - id: verible-format
        name: verible format
        entry: >-
          verible-verilog-format --inplace
          --assignment_statement_alignment=align
          --class_member_variable_alignment=align
          --distribution_items_alignment=align
          --enum_assignment_statement_alignment=align
          --expand_coverpoints=true
          --formal_parameters_alignment=align
          --formal_parameters_indentation=indent
          --module_net_variable_alignment=flush-left
          --named_parameter_alignment=align
          --named_parameter_indentation=indent
          --named_port_alignment=align
          --named_port_indentation=indent
          --port_declarations_alignment=align
          --port_declarations_indentation=indent
          --port_declarations_right_align_packed_dimensions=true
          --port_declarations_right_align_unpacked_dimensions=true
          --struct_union_members_alignment=align
          --indentation_spaces=4
        language: system
        types: [verilog]
        files: '\.(v|sv)$'
      - id: verible-lint
        name: verible style lint
        entry: verible-verilog-lint --rules=-module-filename,-always-comb,-explicit-parameter-storage-type,-unpacked-dimensions-range-ordering
        language: system
        types: [verilog]
        files: '\.(v|sv)$'
        # module-filename disabled: Many modules in libs/basil and design/ have
        # intentional name/filename mismatches (e.g., adc.v vs adc_macro.v for different variants)
        # always-comb disabled: FPGA .v sources use Verilog-2005 always @*;
        # always_comb is a SystemVerilog construct.
        # explicit-parameter-storage-type disabled: Explicit string parameter
        # types are SystemVerilog-only, while FPGA .v sources are Verilog-2005.
        # unpacked-dimensions-range-ordering disabled: Verible requires the
        # SystemVerilog [size] shorthand for zero-based unpacked dimensions,
        # which FPGA .v sources cannot use under Verilog-2005.
        # Verible parses SystemVerilog. Verilator above enforces Verilog-2005
        # for FPGA .v sources.
