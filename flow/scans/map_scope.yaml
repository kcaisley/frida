# Tektronix MSO54 Mixed Signal Oscilloscope
#
# Connected via its raw SCPI socket on the BDAQ53 subnet.
# 4 analog channels, waveform capture, triggering.

name: frida-scope
version: 0.1.0

transfer_layer:
  - name: scope_intf
    type: Visa
    init:
      resource_name: "TCPIP::192.168.10.60::4000::SOCKET"
      backend: "@py"
      list_resources: false
      read_termination: "\n"
      write_termination: "\n"
      timeout: 10000

hw_drivers:
  - name: scope
    type: tektronix_oscilloscope
    interface: scope_intf
    init:
      device: Tektronix Oscilloscope
