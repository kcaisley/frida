# HP/Agilent E3634A VOCM supply at front-panel GPIB address 05.

name: frida-vocm-supply
version: 0.1.0

transfer_layer:
  - name: vocm_supply_intf
    type: Visa
    init:
      resource_name: "GPIB0::5::INSTR"
      backend: "@py"
      list_resources: false
      read_termination: "\n"
      write_termination: "\n"
      timeout: 3000

hw_drivers:
  - name: vocm_supply
    type: scpi
    interface: vocm_supply_intf
    init:
      device: Agilent E3634A
