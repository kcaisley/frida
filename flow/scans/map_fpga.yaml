# FRIDA DAQ Hardware Configuration
#
# Based on:
#   - obelix1-daq/obelix1/system/DAQ.yaml
#   - CordiaADC/ADC_01/host/meas_ADC01.yaml
#
# Signal names match PCB schematic: frida/pcb/frida65A.kicad_sch
#
# Hardware setup:
#   Host PC <--Ethernet--> BDAQ-core (KX2 FPGA) <--LVDS/SPI--> FRIDA chip PCB

name: frida-daq
version: 0.1.0

transfer_layer:
    - name: tcp
      type: SiTcp
      init:
          ip: "192.168.10.16"
          tcp_port: 24
          udp_port: 4660
          tcp_connection: true

    # Previous ADC input supply: Korad KA3005P over USB serial.
    # - name: serial0
    #   type: Serial
    #   init:
    #       port: /dev/ka3005p
    #       baudrate: 9600
    #       timeout: 0.05


hw_drivers:
    # FIFO for ADC data readback (TCP streaming, no basil bus involvement).
    # Data flows directly: core -> fifo_32_to_8 -> SiTCP TCP stream.
    # This approach follows bdaq53 and tjmonopix2. For bus-accessible FIFO
    # with status/fill-level polling, see obelix1-daq's bram_fifo approach.
    - name: fifo0
      type: sitcp_fifo
      interface: tcp

    # 64-bit sequencer for serializer-backed ADC timing signals.
    # Byte lanes 0-3 carry INIT/SAMP/COMP/LOGIC serializer data; bits 32-33
    # carry RX_SEN and RX_TEST control data.
    - name: seq0
      type: seq_gen
      interface: tcp
      base_addr: 0x10000
      mem_size: 8192

    # SPI master for chip configuration
    # directly from obelix1
    # Directly drives SPI_CS_B, SPI_SCLK, SPI_SDI; reads SPI_SDO
    - name: spi0
      type: spi
      interface: tcp
      base_addr: 0x20000

    # GPIO for auxiliary control signals
    # Controls PCB-level discrete signals
    # Bit mapping:
    #   Bit 0: RST_B        - Chip reset (active low)
    #   Bit 1: AMP_EN       - Input amplifier enable (high=enabled, low=bypass/power-down)
    #   Bit 2: LOOPBACK_EN  - fast_spi_rx loopback test mode
    - name: gpio0
      type: gpio
      interface: tcp
      base_addr: 0x30000
      size: 8

    # Fast SPI receiver for COMP_OUT capture
    # Replaces hand-rolled shift register + FIFO
    # Clocked directly from SEQ_CLK (same clock as seq_gen)
    # SEN driven by seq_out[32] (RX_SEN)
    # SDI connected to COMP_OUT from chip
    - name: fastrx0
      type: fast_spi_rx
      interface: tcp
      base_addr: 0x40000

    # GPIO1 controls the comparator input IDELAY and reports IDELAYCTRL status.
    # Bits 4:0: tap value; bit 5: load strobe; bit 6: ready input; bit 7: spare input.
    - name: gpio1
      type: gpio
      interface: tcp
      base_addr: 0x50000
      size: 8

    # GPIO2 commands the top-level PLLE2_ADV output-divider controller.
    # D=1 and M=8 are fixed; the Si570 supplies a 100--200 MHz input.
    - name: gpio2
      type: gpio
      interface: tcp
      base_addr: 0x60000
      size: 16

    # I2C master and the BDAQ53 Si570 programmable oscillator. The oscillator
    # uses its 8-bit I2C address (0xBA) and is initialized to the fastest input.
    - name: i2c0
      type: i2c
      interface: tcp
      base_addr: 0x70000

    - name: si570
      type: si570
      hw_driver: i2c0
      base_addr: 0xBA
      init:
          frequency: 200.0
          factory_frequency: 156.25

    # Previous power supply for ADC input voltage (Korad KA3005P)
    # Connected via USB serial adapter.
    # - name: psu0
    #   type: ka3005p
    #   interface: serial0


# The register layer, provides a higher level way, to name the large banks of registers used for certain blocks.
# This changes the API of how these blocks are used, but brings the benefit of convenient aliases.
registers:
    # Legacy 8-bit TrackRegister wrapper retained for its delegated seq_gen
    # methods. Current serializer scripts call seq0.set_data() through that
    # delegation and do not use TrackRegister.write() or its legacy packing.
    - name: seq0
      type: TrackRegister
      hw_driver: seq0
      seq_width: 8
      seq_size: 8192
      tracks:
          # Tracks 0-3: LVDS clock outputs to chip
          - name: INIT
            position: 0
          - name: SAMP
            position: 1
          - name: COMP
            position: 2
          - name: LOGIC
            position: 3
          # Tracks 4-5: fast_spi_rx capture control
          - name: RX_EN
            position: 4
          - name: RX_TEST
            position: 5
          # Tracks 6-7: spare
          - name: SPARE
            position: 6
          - name: SPARE2
            position: 7

    # GPIO register with named bit-fields
    # Bit mapping:
    #   0: RST_B         - Chip reset (active low)
    #   1: AMP_EN        - Input amplifier enable
    #   2: RX_LOOPBACK   - fast_spi_rx test-data loopback
    #   3: SPI_LOOPBACK  - SPI SDO loopback
    #   4: DBG_FIFO      - Debug counter into FIFO
    #   5: RX_TIEHIGH    - Tie fast_spi_rx input high
    #   6: SEQ_START     - Sequencer external start / fastrx_en
    #   7: RX_EN_MUX     - fastrx_en source: 0=gpio[6], 1=seq_out[32]
    - name: gpio0
      type: StdRegister
      hw_driver: gpio0
      size: 8
      fields:
          - name: RST_B
            size: 1
            offset: 0
          - name: AMP_EN
            size: 1
            offset: 1
          - name: RX_LOOPBACK
            size: 1
            offset: 2
          - name: SPI_LOOPBACK
            size: 1
            offset: 3
          - name: DBG_FIFO
            size: 1
            offset: 4
          - name: RX_TIEHIGH
            size: 1
            offset: 5
          - name: SEQ_START
            size: 1
            offset: 6
          - name: RX_EN_MUX
            size: 1
            offset: 7

    # GPIO1 register for runtime COMP_OUT input-delay control.
    # Call read() before inspecting COMP_IDELAY_RDY.
    - name: gpio1
      type: StdRegister
      hw_driver: gpio1
      size: 8
      fields:
          - name: COMP_IDELAY_TAPS
            size: 5
            offset: 4
          - name: COMP_IDELAY_LOAD
            size: 1
            offset: 5
          - name: COMP_IDELAY_RDY
            size: 1
            offset: 6

    # GPIO2 register for the sequencer/serializer PLL DRP controller.
    # With Si570 frequency FIN, REQUEST_N selects word_clk=2*FIN/N and
    # serializer_clk=8*FIN/N. Toggle APPLY_TOGGLE to submit a command.
    # Poll the returned status until the PLL has relocked.
    - name: gpio2
      type: StdRegister
      hw_driver: gpio2
      size: 16
      fields:
          - name: REQUEST_N
            size: 5
            offset: 4
          - name: APPLY_TOGGLE
            size: 1
            offset: 5
          - name: APPLIED_TOGGLE
            size: 1
            offset: 7
          - name: BUSY
            size: 1
            offset: 8
          - name: LOCKED
            size: 1
            offset: 9
          - name: ERROR
            size: 1
            offset: 10
          - name: ACTIVE_N
            size: 5
            offset: 15
