# FRIDA DAQ Hardware Configuration
#
# Based on:
#   - obelix1-daq/obelix1/system/DAQ.yaml
#   - CordiaADC/ADC_01/host/meas_ADC01.yaml
#
# Signal names match PCB schematic: frida/pcb/frida65A.kicad_sch
#
# Hardware setup:
#   Host PC <--Ethernet--> BDAQ-core (KX2 FPGA) <--LVDS/SPI--> FRIDA chip PCB

name: frida-daq
version: 0.1.0

transfer_layer:
    - name: tcp
      type: SiTcp
      init:
          ip: "192.168.10.16"
          tcp_port: 24
          udp_port: 4660
          tcp_connection: true

hw_drivers:
    # FIFO for ADC data readback (TCP streaming, no basil bus involvement).
    # Data flows directly: core -> fifo_32_to_8 -> SiTCP TCP stream.
    # This approach follows bdaq53 and tjmonopix2. For bus-accessible FIFO
    # with status/fill-level polling, see obelix1-daq's bram_fifo approach.
    - name: fifo0
      type: sitcp_fifo
      interface: tcp

    # Sequencer for ADC timing signals
    # Generates: CLK_INIT, CLK_SAMP, CLK_COMP, CLK_LOGIC,
    #   FASTRX_EN, FASTRX_TEST_DATA
    # TrackRegister tracks renamed to short aliases for direct script access:
    #   INIT, SAMP, COMP, LOGIC, RX_EN, RX_TEST, SPARE, SPARE2
    - name: seq0
      type: seq_gen
      interface: tcp
      base_addr: 0x10000
      mem_size: 8192

    # SPI master for chip configuration
    # directly from obelix1
    # Directly drives SPI_CS_B, SPI_SCLK, SPI_SDI; reads SPI_SDO
    - name: spi0
      type: spi
      interface: tcp
      base_addr: 0x20000

    # GPIO for auxiliary control signals
    # Controls PCB-level discrete signals
    # Bit mapping:
    #   Bit 0: RST_B        - Chip reset (active low)
    #   Bit 1: AMP_EN       - Input amplifier enable (high=enabled, low=bypass/power-down)
    #   Bit 2: LOOPBACK_EN  - fast_spi_rx loopback test mode
    - name: gpio0
      type: gpio
      interface: tcp
      base_addr: 0x30000
      size: 8

    # Fast SPI receiver for COMP_OUT capture
    # Replaces hand-rolled shift register + FIFO
    # Clocked directly from SEQ_CLK (same clock as seq_gen)
    # SEN driven by seq_out[4] (RX_EN)
    # SDI connected to COMP_OUT from chip
    - name: fastrx0
      type: fast_spi_rx
      interface: tcp
      base_addr: 0x40000

# The register layer, provides a higher level way, to name the large bannks of registers used for certain blocks.
# This will change the API of how these blocks are used, but bring the benefit of convenient aliases.
registers:
    # Track register for sequencer waveforms
    # 8 tracks matching daq_core.v seq_out[7:0]
    - name: seq0
      type: TrackRegister
      hw_driver: seq0
      seq_width: 8
      seq_size: 8192
      tracks:
          # Tracks 0-3: LVDS clock outputs to chip
          - name: INIT
            position: 0
          - name: SAMP
            position: 1
          - name: COMP
            position: 2
          - name: LOGIC
            position: 3
          # Tracks 4-5: fast_spi_rx capture control
          - name: RX_EN
            position: 4
          - name: RX_TEST
            position: 5
          # Tracks 6-7: spare
          - name: SPARE
            position: 6
          - name: SPARE2
            position: 7

    # GPIO register with named bit-fields
    # Bit mapping:
    #   0: RST_B         - Chip reset (active low)
    #   1: AMP_EN        - Input amplifier enable
    #   2: RX_LOOPBACK   - fast_spi_rx test-data loopback
    #   3: SPI_LOOPBACK  - SPI SDO loopback
    #   4: DBG_FIFO      - Debug counter into FIFO
    #   5: RX_TIEHIGH    - Tie fast_spi_rx input high
    #   6: SEQ_START     - Sequencer external start / fastrx_en
    #   7: RX_EN_MUX     - fastrx_en source: 0=gpio[6], 1=seq_out[4]
    - name: gpio0
      type: StdRegister
      hw_driver: gpio0
      size: 8
      fields:
          - name: RST_B
            size: 1
            offset: 0
          - name: AMP_EN
            size: 1
            offset: 1
          - name: RX_LOOPBACK
            size: 1
            offset: 2
          - name: SPI_LOOPBACK
            size: 1
            offset: 3
          - name: DBG_FIFO
            size: 1
            offset: 4
          - name: RX_TIEHIGH
            size: 1
            offset: 5
          - name: SEQ_START
            size: 1
            offset: 6
          - name: RX_EN_MUX
            size: 1
            offset: 7
