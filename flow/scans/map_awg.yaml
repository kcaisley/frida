# Agilent 33250A waveform generator on the NI GPIB-USB-B adapter.

name: frida-awg
version: 0.1.0

transfer_layer:
  - name: awg_intf
    type: Visa
    init:
      resource_name: "GPIB0::10::INSTR"
      backend: "@py"
      list_resources: false
      read_termination: "\n"
      write_termination: "\n"
      timeout: 3000

hw_drivers:
  - name: awg
    type: agilent33250a
    interface: awg_intf
    init:
      device: Agilent 33250A
