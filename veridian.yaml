# Veridian configuration for FRIDA HDL linting

include_dirs:
    - libs/basil/basil/firmware/modules
    - libs/basil/basil/firmware/modules/includes
    - design/hdl
    - design/fpga
    - design/fpga/SiTCP

source_dirs:
    - design/fpga

verible:
    syntax:
        enabled: true
        args:
            - "--lang=sv"
    format:
        enabled: true
        args:
            - --inplace
            - --assignment_statement_alignment=align
            - --class_member_variable_alignment=align
            - --distribution_items_alignment=align
            - --enum_assignment_statement_alignment=align
            - --expand_coverpoints=true
            - --formal_parameters_alignment=align
            - --formal_parameters_indentation=indent
            - --module_net_variable_alignment=flush-left
            - --named_parameter_alignment=align
            - --named_parameter_indentation=indent
            - --named_port_alignment=align
            - --named_port_indentation=indent
            - --port_declarations_alignment=align
            - --port_declarations_indentation=indent
            - --port_declarations_right_align_packed_dimensions=true
            - --port_declarations_right_align_unpacked_dimensions=true
            - --struct_union_members_alignment=align
            - --indentation_spaces=4
        exclude_dirs:
            - libs/basil
    lint:
        enabled: true
        # always-comb: FPGA .v sources use Verilog-2005 always @*.
        # explicit-parameter-storage-type: Explicit string parameter types are
        # SystemVerilog-only; FPGA .v sources use Verilog-2005.
        # unpacked-dimensions-range-ordering: Its [size] shorthand is
        # SystemVerilog-only; FPGA .v sources use explicit Verilog-2005 ranges.
        args:
            - --rules=-module-filename,-always-comb,-explicit-parameter-storage-type,-unpacked-dimensions-range-ordering
        exclude_dirs:

verilator:
    syntax:
        enabled: true
        args:
            - --lint-only
            - --language
            - 1364-2005
            - -Wall
            - --top-module
            - daq_top
            - verilator.vlt
            - -Ilibs/basil/basil/firmware/modules
            - -Ilibs/basil/basil/firmware/modules/utils
            - -Ilibs/basil/basil/firmware/modules/includes
            - -Idesign/hdl
            - -Idesign/fpga
            - -Idesign/fpga/SiTCP
