# Veridian configuration for FRIDA HDL linting

include_dirs:
  - libs/basil/basil/firmware/modules
  - libs/basil/basil/firmware/modules/utils
  - design/hdl
  - design/fpga
  - design/fpga/SiTCP

verilator:
  syntax:
    enabled: true
    args:
      - --lint-only
      - --sv
      - -Wall
      - -Ilibs/basil/basil/firmware/modules
      - -Idesign/hdl
      - -Idesign/fpga
      - -Idesign/fpga/SiTCP
