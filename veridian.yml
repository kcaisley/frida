# Veridian configuration for FRIDA HDL linting

include_dirs:
  - libs/basil/basil/firmware/modules
  - libs/basil/basil/firmware/modules/includes
  - design/hdl
  - design/fpga
  - design/fpga/SiTCP

source_dirs:
  - design/fpga

verilator:
  syntax:
    enabled: true
    args:
      - --lint-only
      - --sv
      - -Wall
      - --top-module
      - daq_top
      - -Wno-EOFNEWLINE
      - -Wno-DECLFILENAME
      - -Wno-TIMESCALEMOD
      - -Wno-PINCONNECTEMPTY
      - -Wno-GENUNNAMED
      - -Wno-WIDTHCONCAT
      - -Wno-WIDTHTRUNC
      - -Wno-WIDTHEXPAND
      - -Wno-REDEFMACRO
      - -Wno-UNUSEDSIGNAL
      - -Wno-UNDRIVEN
      - -Wno-UNUSEDPARAM
      - -Wno-MODMISSING
      - -Wno-MODDUP
      - -Wno-PINMISSING
      - -Ilibs/basil/basil/firmware/modules
      - -Ilibs/basil/basil/firmware/modules/includes
      - -Idesign/hdl
      - -Idesign/fpga
      - -Idesign/fpga/SiTCP
